<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout :: none">
<body>
<div th:with="pageTitle='Dashboard', content=~{::content}">
  <div th:fragment="content">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h1 class="h3 fw-semibold mb-0">Dashboard</h1>
      <span class="badge text-bg-secondary">Prototype</span>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="card h-100"><div class="card-body">
          <div class="text-muted small">This week</div>
          <div class="fs-3 fw-semibold">0 sessions</div>
        </div></div>
      </div>
      <div class="col-md-4">
        <div class="card h-100"><div class="card-body">
          <div class="text-muted small">Today</div>
          <div class="fs-3 fw-semibold">0 kcal</div>
        </div></div>
      </div>
      <div class="col-md-4">
        <div class="card h-100"><div class="card-body">
          <div class="text-muted small">Next milestone</div>
          <div class="fs-3 fw-semibold">—</div>
        </div></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
