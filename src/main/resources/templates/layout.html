<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${pageTitle} ?: 'Fitness App'">Fitness App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/static/css/styles.css}">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-semibold" th:href="@{/}">Fitness App</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-2">
        <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/login}">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4">
  <div th:replace="${content}"></div>
</main>

<footer class="border-top py-3 mt-5">
  <div class="container d-flex justify-content-between small text-muted">
    <span>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> Fitness App</span>
    <span>Built with Kotlin + Ktor</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/app.js}"></script>
</body>
</html>
