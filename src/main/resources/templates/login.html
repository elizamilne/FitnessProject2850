<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout :: none">
<body>
<div th:with="pageTitle='Login', content=~{::content}">
  <div th:fragment="content" class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h2 class="h4 fw-semibold mb-3">Log in</h2>
          <form method="post" action="/login" class="vstack gap-3">
            <div>
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" required>
            </div>
            <div>
              <label class="form-label">Password</label>
              <input class="form-control" type="password" name="password" required>
            </div>
            <button class="btn btn-dark w-100" type="submit">Login</button>
          </form>
          <p class="small text-muted mt-3 mb-0">Auth wiring comes next step.</p>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
